name: 'Setup GAP for package testing'
description: 'Download and compile CI scripts, GAP and its packages'
inputs:
  GAP_VERSION:
    description: 'The gap version or branch to use (default: latest release)'
    required: false
    default: 'latest'
  GAP_BOOTSTRAP:
    description: 'make bootstrap-pkg-? (i.e. full/minimal)'
    required: false
    default: 'full'
env:
  CHERE_INVOKING: 1
runs:
  using: "composite"
  steps:
      - name: "Install dependencies"
        run: |
          echo "Installing dependencies"
          if [ "${{runner.os}}" = "Linux" ]; then
            packages=(
              libgmp-dev
              libreadline-dev
              zlib1g-dev
            )
            sudo apt-get install "${packages[@]}"
          elif [ "${{runner.os}}" = "macOS" ]; then
            brew install gmp zlib autoconf && brew link zlib
          fi
        shell: bash

      - name: "Decide GAP version/branch"
        shell: bash
        run: |
          GIT_TAGS=$(git ls-remote --tags --refs https://github.com/gap-system/gap.git | sed 's|.*refs/tags/||')
          GIT_BRANCHES=$(git ls-remote --heads https://github.com/gap-system/gap.git | sed 's|.*refs/heads/||')
          LATEST_TAG=$(echo "$GIT_TAGS" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
          DEFAULT_BRANCH=$(git ls-remote --symref https://github.com/gap-system/gap.git HEAD | head -n 1 | sed 's|ref: refs/heads/||; s|\tHEAD||')
          if [[ "${{ inputs.GAP_VERSION }}" == "latest" ]] ; then
            VERSION=$LATEST_TAG
          elif [[ "${{ inputs.GAP_VERSION }}" == "default" ]] ; then
            VERSION=$DEFAULT_BRANCH
          elif echo "$GIT_BRANCHES" | grep -qx "${{ inputs.GAP_VERSION }}" || echo "$GIT_TAGS" | grep -qx "${{ inputs.GAP_VERSION }}" ; then
            VERSION=${{ inputs.GAP_VERSION }}
          elif echo "$GIT_TAGS" | grep -qx "v${{ inputs.GAP_VERSION }}" ; then
            VERSION=v${{ inputs.GAP_VERSION }}
          else
            echo "No branch or tag with name $GAP_VERSION found"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          
      - name: "Clone GAP"
        shell: bash
        run: git clone --branch ${{ env.VERSION }} --depth=1 --single-branch https://github.com/gap-system/gap.git $HOME/gap

      - name: "Build GAP"
        shell: bash
        run: |
          cd $HOME/gap
          CONFIGFLAGS="${{ inputs.CONFIGFLAGS }}"

          # build GAP in a subdirectory
          ./autogen.sh
          ./configure $CONFIGFLAGS
          make -j4 V=1

          # make it available
          ln -s $HOME/gap/gap /usr/local/bin/gap
